##
## Build changed elearning images and push them to GHCR.
##
## Each app maps to a target in devops/docker/Dockerfile and a GHCR image:
##   api     → ghcr.io/tun2g/elearning-api
##   web     → ghcr.io/tun2g/elearning-web
##   landing → ghcr.io/tun2g/elearning-landing
##
## Only images whose sources changed are rebuilt (dorny/paths-filter). The VPS
## releases by pulling :latest (see chamee-devops ./deploy.sh pull).
##
## NEXT_PUBLIC_* are baked at build time — set them as repo Variables:
##   vars.NEXT_PUBLIC_API_URL, vars.NEXT_PUBLIC_APP_URL, vars.NEXT_PUBLIC_SITE_URL
##

name: Build and push images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: tun2g

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      landing: ${{ steps.filter.outputs.landing }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          # Shared packages + the Dockerfile force a rebuild of every app.
          filters: |
            shared: &shared
              - 'packages/**'
              - 'pnpm-lock.yaml'
            api:
              - *shared
              - 'apps/api/**'
            web:
              - *shared
              - 'apps/web/**'
            landing:
              - *shared
              - 'apps/landing/**'

  build-api:
    name: Build · api
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/elearning-api:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/elearning-api:sha-${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-web:
    name: Build · web
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/elearning-web:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/elearning-web:sha-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-landing:
    name: Build · landing
    needs: detect-changes
    if: needs.detect-changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/landing/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/elearning-landing:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/elearning-landing:sha-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing
